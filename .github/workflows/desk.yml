name: pattern

on:
  push:

jobs:
  plunge:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bomb: ["always", "organism", "adopt", "keeper", "definite"]
        intelligence: ["commit", "pine", "clock", "fashion"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar re.jar
